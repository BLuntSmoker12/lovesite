<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- ✅ MOBILE FIX -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Will You Be My Partner?</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Pacifico&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>

/* ✅ ADDED FIX */
html {
  overflow: hidden;
  height: 100%;
}

body {
  margin: 0;
  text-align: center;
  font-family: 'Poppins', sans-serif;
  overflow: hidden;

  /* ✅ FIX */
  min-height: 100dvh;
  height: 100vh; /* ✅ ADDED */

  background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #ffdde1, #ff4d6d);
  background-size: 400% 400%;
  animation: gradientBG 10s ease infinite;
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

h1 {
  margin-top: 100px;
  font-size: 2.5em;
  color: white;
  font-family: 'Pacifico', cursive;
}

.love-font {
  font-family: 'Quicksand', sans-serif;
  font-weight: 600;
  letter-spacing: 1px;
}

.btn {
  padding: 18px 40px;
  font-size: 20px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  position: fixed;

  width: 80%;
  max-width: 300px;

  left: 50%;
  transform: translateX(-50%);
}

#yesBtn {
  top: 60%;
  background-color: #ff4d6d;
  color: white;
  animation: heartbeat 1.2s infinite;
}

#noBtn {
  top: 70%;
  background-color: #444;
  color: white;
}

@keyframes heartbeat {
  0% { transform: translateX(-50%) scale(1); }
  50% { transform: translateX(-50%) scale(1.1); }
  100% { transform: translateX(-50%) scale(1); }
}

.bg-heart {
  position: absolute;
  color: rgba(255,255,255,0.3);
  animation: floatSlow 10s linear infinite;
}

@keyframes floatSlow {
  0% { transform: translateY(100vh); }
  100% { transform: translateY(-10vh); }
}

.heart-float {
  position: absolute;
  animation: floatUp 3s linear forwards;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-200px); opacity: 0; }
}

.animal {
  font-size: 80px;
  margin-bottom: 10px;
  animation: heartbeatBear 1.2s infinite;
}

@keyframes heartbeatBear {
  0% { transform: scale(1); }
  25% { transform: scale(1.1); }
  40% { transform: scale(0.95); }
  60% { transform: scale(1.15); }
  100% { transform: scale(1); }
}

#result {
  display: none;
  margin-top: 100px;
}

#typingText {
  font-family: 'Quicksand', sans-serif;
  font-weight: 600;
  font-size: 24px;
  color: white;
}

/* LYRIC BOX */
#lyrics {
  position: fixed;
  bottom: 120px;
  width: 100%;
  color: white;
  font-size: 22px;
  font-family: 'Quicksand', sans-serif;
  font-weight: 600;
  text-shadow: 0 0 10px rgba(0,0,0,0.4);

  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  min-height: 200px;
}

#centerLyric {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  font-size: 28px;
  font-family: 'Quicksand', sans-serif;
  font-weight: 600;
  text-align: center;
  text-shadow: 0 0 15px rgba(255, 77, 109, 0.8);
  opacity: 0;
  transition: opacity 1s ease, transform 1s ease;
}

#centerLyric.show {
  opacity: 1 !important;
  transform: translate(-50%, -50%) scale(1.05);
}

#rightImage {
  position: fixed;
  right: 30px;
  top: 50%;
  transform: translateY(-50%);
  width: 220px;
  border-radius: 16px;
  animation: floatImg 3s ease-in-out infinite;
  z-index: 10;
}

@keyframes floatImg {
  0% { transform: translateY(-50%) translateX(0px); }
  50% { transform: translateY(-52%) translateX(-5px); }
  100% { transform: translateY(-50%) translateX(0px); }
}

#yesBtn {
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

#yesBtn img {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: none;
  animation: popIn 0.4s ease forwards;
}

@keyframes popIn {
  0% { transform: scale(0); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

/* CLAIM IMAGE */
#claimImage {
  position: fixed;
  right: 46%;
  top: 60%;
  width: 200px;
  max-width: 40vw;
  transform: translateY(-50%) scale(10);
  opacity: 0;
  transition: opacity 1s ease, transform 1s ease;
  border-radius: 12px;
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
  z-index: 20;
}

#bottomText {
  position: fixed;
  bottom: 20px;
  width: 100%;
  text-align: center;
  color: white;
  font-size: 18px;
}

#creditText {
  position: fixed;
  right: 15px;
  bottom: 15px;
  color: white;
  font-size: 14px;
}

/* MOBILE */
@media (max-width: 600px) {
  h1 { font-size: 1.8em; margin-top: 60px; }
  #centerLyric { font-size: 20px; width: 90%; }
  #lyrics { font-size: 16px; bottom: 80px; }
  #rightImage { display: none; }
  .animal { font-size: 50px; }
}
</style>
</head>

<body>

<!-- ✅ ADDED JS FIX -->
<script>
function lockHeight() {
  document.body.style.height = window.innerHeight + "px";
}
window.addEventListener("resize", lockHeight);
lockHeight();
</script>
