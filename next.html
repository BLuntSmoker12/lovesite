<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maybe something here</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Pacifico&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
  <style>
 body {
  margin: 0;
  min-height: 100vh;

  display: flex;
  justify-content: flex-start;
  align-items: center;
  
  flex-direction: column;

  padding-top: 200px;

  background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #ffdde1, #ff4d6d);
  background-size: 400% 400%;
  animation: gradientBG 10s ease infinite;

  font-family: 'Poppins', sans-serif;
  color: white;
  text-align: center;
}

.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px; /* spacing between text and image */
}

h1 {
  font-size: 2rem;
  margin: 0;
}

/* BIG HORIZONTAL IMAGE */
.main-img {
  width: 1500px;
  max-width: 90vw;
  height: auto;

  border-radius: 16px;
  box-shadow: 0 0 25px rgba(0,0,0,0.4);

  animation: popIn 1s ease forwards;
}

/* animations */
@keyframes popIn {
  0% { transform: scale(0.7); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
    h1 {
      font-size: 2rem;
    }
  </style>
</head>
<body>
  <h1>Come let's play pragmata on 17th april, i'll walk you through it as i said ;></h1>
  <img src="image.png" class="main-img">
</body>
</html>
